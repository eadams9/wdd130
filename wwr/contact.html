<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Economic White Water Rafting</title>
    <meta name="description"
      content="Contact us or leave your details, we'll call you back. Fast support for questions, reservations, or feedback.">
    <meta name="author" content="Emmanuel Adams">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-raftingcompas.jpg" alt="Logo" class="logo">
        <nav>
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="address">
            <h1>Economic White Water Rafting</h1>
            <article>123 Main river Street <br> Kolob, California <br> +1 999 234 2233
                <br>info@economicwhitewater.com
            </article>
        </section>
        <section class="about-column1">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3132.6108081767384!2d-122.07275029449151!3d38.26533157099521!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x808516a5c765d525%3A0x34cf565b91bd9188!2sKolob%20Ct%2C%20Fairfield%2C%20CA%2094534%2C%20USA!5e0!3m2!1sen!2sgh!4v1781111440879!5m2!1sen!2sgh"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form class="frm-contact">
                <div class="form-item column2">
                    <label for="Fname">Name</label>
                    <input type="text" id="Fname" name="Fname">
                </div>
                <div class="form-item column2">
                    <label for="useremail">Email</label>
                    <input type="email" id="useremail" name="useremail">
                </div>
                <div class="form-item radio-start column2">
                    <label>Message Purpose</label>
                    <div class="radios">
                        <label for="General"><input type="radio" name="message-purpose"
                              value="General" id="General"> General
                            Enquiry</label>
                        <label for="Reservation"><input type="radio" name="message-purpose"
                              value="Reservation" id="Reservation">
                            Reservation Questions</label>
                        <label for="suggestions"><input type="radio" name="message-purpose"
                              value="suggestions" id="suggestions"> Website
                            Suggestions</label>
                    </div>
                </div>
                <div class="form-item">
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="3"
                      placeholder="Type here..."></textarea>
                </div>
                <div class="form-item column1">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    <label for="subscribe">Please Subscribe me to the monthly newsletter</label>
                </div>
                <div class="button">
                    <button type="submit">Get in Touch!</button>
                </div>
            </form>
        </section>
        <section class="adventure">
            <h2>We Are Here to Serve You</h2>
            <div class="adventure-grid">
                <figure>
                    <img src="images/man1.webp" alt="Marketing director">
                    <figcaption>Marketing director</figcaption>
                </figure>
                <figure>
                    <img src="images/man2.webp" alt="Chief Executive Officer">
                    <figcaption>Chief Executive Officer</figcaption>
                </figure>
                <figure>
                    <img src="images/woman1.webp" alt="Human Resource Manager">
                    <figcaption>Human Resource Manager</figcaption>
                </figure>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Economic White Water Rafting. Emmanuel Adams.</p>
        <nav class="socialmedia">
            <a href="https://www.facebook.com" target="_blank">
                <img src="images/social-media.png" alt="facebook">
            </a>
            <a href="https://www.twitter.com" target="_blank">
                <img src="images/linkedin-2504923.png" alt="linkedin">
            </a>
            <a href="https://www.instagram.com" target="_blank">
                <img src="images/instagram-4782335.png" alt="Instagram">
            </a>
        </nav>
    </footer>
</body>

</html>
